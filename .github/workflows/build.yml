# Workflow name
name: Build and push container images to Artifactory

# Trigger on workflow_call
on:
  workflow_call:
    inputs:
      artifactory_registry_url:
        description: 'Registry URL for JFrog Artifactory e.g tfy.jfrog.io'
        required: false
        type: string
      artifactory_repository_url:
        description: 'Repository url for JFrog Artifactory e.g tfy.jfrog.io/tfy-images'
        required: false
        type: string
      image_artifact_name:
        description: 'Name of the image artifact, usually the repository name e.g mlfoundry-server'
        required: true
        type: string
      image_tag:
        description: 'Image tag for the image to be pushed'
        required: true
        type: string
      extra_image_tag:
        description: 'Extra image tags for the image to be pushed (array)'
        required: false
        type: string
      image_context:
        description: 'Context for the image to be built'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Platforms for the image to be built'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      enable_scan:
        description: 'Enable image scanning'
        required: false
        type: boolean
        default: false
      enable_public_ecr:
        description: 'Enable push to ECR'
        required: false
        type: boolean
        default: false
      ecr_repository_url:
        description: 'Repository URL for AWS Public ECR e.g public.ecr.aws/your-alias/your-repo'
        required: false
        type: string
      enable_jfrog:
        description: 'Enable push to JFROG'
        required: false
        type: boolean
        default: true
      enable_ghcr:
        description: 'Enable push to GitHub Container Registry (ghcr.io)'
        required: false
        type: boolean
        default: false
      ghcr_repository_url:
        description: 'Repository URL for GHCR, i.e. registry + owner (e.g. ghcr.io/your-org). Must be lowercase; it is lowercased automatically.'
        required: false
        type: string
      aws_ecr_region:
        description: 'AWS Public ECR region'
        required: false
        type: string
        default: 'us-east-1'
      image_scan_severity_cutoff:
        description: 'Severity cutoff for image scanning'
        required: false
        type: string
        default: 'high'
      dockerfile_path:
        description: 'Dockerfile for the image to be built'
        required: false
        type: string
        default: 'Dockerfile'
      image_build_args:
        description: 'Build arguments for the image to be built'
        required: false
        type: string
      free_disk_space:
        description: 'Free disk space on the runner'
        required: false
        type: boolean
        default: false
      free_disk_space_docker_images:
        description: 'Free disk space for Docker images'
        required: false
        type: boolean
        default: false
      free_disk_space_tool_cache_storage:
        description: 'Free disk space for tool cache storage'
        required: false
        type: boolean
        default: false
      free_disk_space_large_packages:
        description: 'Free disk space for large packages'
        required: false
        type: boolean
        default: false
      enable_provenance:
        description: 'Enable provenance attestation for supply chain security'
        required: false
        type: boolean
        default: false
      enable_sbom:
        description: 'Generate an SPDX SBOM for the pushed image and upload it as a workflow artifact (e.g. to attach to a release for OpenSSF compliance)'
        required: false
        type: boolean
        default: false
      sbom_artifact_name:
        description: 'Name of the uploaded workflow artifact that contains the SBOM'
        required: false
        type: string
        default: 'sbom'
      enable_sign:
        description: 'Keyless (Sigstore) sign the pushed image by digest with cosign (signature stored in the registry and emitted as .sig/.pem/.payload files) and sign the SPDX SBOM to produce a .sigstore.json bundle. All signature files are uploaded in the SBOM workflow artifact for attaching to a GitHub release (OpenSSF Signed-Releases). Requires the calling job to grant id-token: write. Signing the SBOM requires enable_sbom to be true.'
        required: false
        type: boolean
        default: false
      checkout_submodules:
        description: 'Whether to checkout git submodules: "true", "recursive", or "false"'
        required: false
        type: string
        default: 'false'
      checkout_fetch_depth:
        description: 'Number of commits to fetch. 0 fetches all history'
        required: false
        type: number
        default: 1
    outputs:
      sbom_artifact_name:
        description: 'Name of the uploaded workflow artifact containing the SPDX SBOM (download with actions/download-artifact to attach it to a release). Empty when enable_sbom is false.'
        value: ${{ jobs.build.outputs.sbom_artifact_name }}
      sbom_file_name:
        description: 'File name of the SPDX SBOM inside the uploaded artifact. Empty when enable_sbom is false.'
        value: ${{ jobs.build.outputs.sbom_file_name }}
      sbom_signature_file_name:
        description: 'File name of the keyless Sigstore bundle (*.sigstore.json) signing the SBOM, inside the uploaded artifact. Empty unless enable_sign and enable_sbom are both true.'
        value: ${{ jobs.build.outputs.sbom_signature_file_name }}
      image_signature_file_name:
        description: 'File name of the raw cosign image signature (*.sig) inside the uploaded artifact. Empty when enable_sign is false.'
        value: ${{ jobs.build.outputs.image_signature_file_name }}
      image_certificate_file_name:
        description: 'File name of the Fulcio signing certificate (*.pem) for the image signature, inside the uploaded artifact. Empty when enable_sign is false.'
        value: ${{ jobs.build.outputs.image_certificate_file_name }}
    secrets:
      artifactory_username:
        description: 'Username for JFrog Artifactory. Required if enable_jfrog is true'
        required: false
      artifactory_password:
        description: 'Password for JFrog Artifactory. Required if enable_jfrog is true'
        required: false
      ecr_role_arn:
        description: 'Role ARN required to pull and push images to public ecr. Required if enable_public_ecr is true'
        required: false
      checkout_token:
        description: 'Token used for checkout (required for private submodules)'
        required: false
      image_build_secrets:
        description: 'Newline-delimited KEY=VALUE build args that contain secrets. Appended to image_build_args (which cannot carry secrets since the caller with: block has no secrets context).'
        required: false
      ghcr_token:
        description: 'Token used to push to GHCR. Optional: defaults to the caller-provided GITHUB_TOKEN (needs packages: write permission). Provide a PAT only when pushing to an owner different from the calling repository.'
        required: false

# Jobs
jobs:
  build:
    name: Build and Push Image to Repository
    runs-on: ubuntu-latest
    outputs:
      sbom_artifact_name: ${{ (inputs.enable_sbom || inputs.enable_sign) && inputs.sbom_artifact_name || '' }}
      sbom_file_name: ${{ steps.sbom.outputs.file }}
      sbom_signature_file_name: ${{ steps.sign_sbom.outputs.signature_file }}
      image_signature_file_name: ${{ steps.sign_image.outputs.signature_file }}
      image_certificate_file_name: ${{ steps.sign_image.outputs.certificate_file }}
    env:
      JFROG_IMAGE_URL: ${{ inputs.artifactory_repository_url }}/${{ inputs.image_artifact_name }}
      ECR_IMAGE_URL: ${{ inputs.ecr_repository_url }}/${{ inputs.image_artifact_name }}
      GHCR_IMAGE_URL: ${{ inputs.ghcr_repository_url }}/${{ inputs.image_artifact_name }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.free_disk_space }}
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: ${{ inputs.free_disk_space_large_packages }}
          docker-images: ${{ inputs.free_disk_space_docker_images }}
          tool-cache: ${{ inputs.free_disk_space_tool_cache_storage }}
          swap-storage: false

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.checkout_submodules }}
          fetch-depth: ${{ inputs.checkout_fetch_depth }}
          token: ${{ secrets.checkout_token || github.token }}

      - name: Validate registry configuration
        run: |
          if [ "${{ inputs.enable_jfrog }}" != "true" ] && [ "${{ inputs.enable_public_ecr }}" != "true" ] && [ "${{ inputs.enable_ghcr }}" != "true" ]; then
            echo "Error: At least one registry must be enabled (enable_jfrog, enable_public_ecr or enable_ghcr)"
            exit 1
          fi

          if [ "${{ inputs.enable_jfrog }}" == "true" ]; then
            if [ -z "${{ inputs.artifactory_registry_url }}" ] || [ -z "${{ inputs.artifactory_repository_url }}" ]; then
              echo "Error: artifactory_registry_url and artifactory_repository_url are required when enable_jfrog is true"
              exit 1
            fi
          fi

          if [ "${{ inputs.enable_public_ecr }}" == "true" ]; then
            if [ -z "${{ inputs.ecr_repository_url }}" ]; then
              echo "Error: ecr_repository_url is required when enable_public_ecr is true"
              exit 1
            fi
          fi

          if [ "${{ inputs.enable_ghcr }}" == "true" ]; then
            if [ -z "${{ inputs.ghcr_repository_url }}" ]; then
              echo "Error: ghcr_repository_url is required when enable_ghcr is true"
              exit 1
            fi
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog Artifactory
        uses: docker/login-action@v3
        if: ${{ inputs.enable_jfrog }}
        with:
          username: ${{ secrets.artifactory_username }}
          password: ${{ secrets.artifactory_password }}
          registry: ${{ inputs.artifactory_registry_url }}

      - name: configure aws credentials
        if: ${{ inputs.enable_public_ecr }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ecr_role_arn }}
          aws-region: ${{ inputs.aws_ecr_region }}

      - name: Login to AWS Public ECR
        if: ${{ inputs.enable_public_ecr }}
        run: |
          aws ecr-public get-login-password --region ${{ inputs.aws_ecr_region }} | docker login --username AWS --password-stdin public.ecr.aws

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ inputs.enable_ghcr }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token || github.token }}

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        if: ${{ inputs.enable_scan }}
        with:
          push: false
          load: true
          file: ${{ inputs.dockerfile_path }}
          context: ${{ inputs.image_context }}
          platforms: linux/amd64 # arm intentionally excluded since we can do with just amd for scan image action
          tags: |
            ${{ inputs.image_artifact_name }}:${{ inputs.image_tag }}-scan
          build-args: |
            ${{ inputs.image_build_args }}
            ${{ secrets.image_build_secrets }}

      - name: Scan image
        uses: anchore/scan-action@v6
        if: ${{ inputs.enable_scan }}
        with:
          image: ${{ inputs.image_artifact_name }}:${{ inputs.image_tag }}-scan
          fail-build: true
          severity-cutoff: ${{ inputs.image_scan_severity_cutoff }}
          output-format: table

      - name: Prepare image tags
        id: prepare_tags
        env:
          JFROG_IMAGE_URL: ${{ env.JFROG_IMAGE_URL }}
          ECR_IMAGE_URL: ${{ env.ECR_IMAGE_URL }}
          GHCR_IMAGE_URL: ${{ env.GHCR_IMAGE_URL }}
          ENABLE_JFROG: ${{ inputs.enable_jfrog }}
          ENABLE_ECR: ${{ inputs.enable_public_ecr }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
        run: |
          TAGS=()

          # GHCR requires the image reference to be lowercase; normalize it and
          # propagate the lowercased value to later steps (cache, SBOM).
          if [ "$ENABLE_GHCR" == "true" ]; then
            GHCR_IMAGE_URL="${GHCR_IMAGE_URL,,}"
            echo "GHCR_IMAGE_URL=$GHCR_IMAGE_URL" >> "$GITHUB_ENV"
          fi

          # Add primary tags for enabled registries
          if [ "$ENABLE_JFROG" == "true" ]; then
            echo "Adding JFrog tag: $JFROG_IMAGE_URL:${{ inputs.image_tag }}"
            TAGS+=("$JFROG_IMAGE_URL:${{ inputs.image_tag }}")
          fi

          if [ "$ENABLE_ECR" == "true" ]; then
            echo "Adding ECR tag: $ECR_IMAGE_URL:${{ inputs.image_tag }}"
            TAGS+=("$ECR_IMAGE_URL:${{ inputs.image_tag }}")
          fi

          if [ "$ENABLE_GHCR" == "true" ]; then
            echo "Adding GHCR tag: $GHCR_IMAGE_URL:${{ inputs.image_tag }}"
            TAGS+=("$GHCR_IMAGE_URL:${{ inputs.image_tag }}")
          fi

          # Process extra tags if provided
          if [ -n "${{ inputs.extra_image_tag }}" ]; then
            echo "Processing extra image tags: ${{ inputs.extra_image_tag }}"
            while IFS= read -r tag; do
              tag="${tag%\"}"
              tag="${tag#\"}"
              tag="${tag// /}"
              
              if [ -n "$tag" ]; then
                if [ "$ENABLE_JFROG" == "true" ]; then
                  echo "Adding extra JFrog tag: $JFROG_IMAGE_URL:$tag"
                  TAGS+=("$JFROG_IMAGE_URL:$tag")
                fi
                if [ "$ENABLE_ECR" == "true" ]; then
                  echo "Adding extra ECR tag: $ECR_IMAGE_URL:$tag"
                  TAGS+=("$ECR_IMAGE_URL:$tag")
                fi
                if [ "$ENABLE_GHCR" == "true" ]; then
                  echo "Adding extra GHCR tag: $GHCR_IMAGE_URL:$tag"
                  TAGS+=("$GHCR_IMAGE_URL:$tag")
                fi
              fi
            done <<< "${{ inputs.extra_image_tag }}"
          fi

          echo "All tags to be pushed:"
          printf '%s\n' "${TAGS[@]}"

          # Save to GitHub environment
          {
            echo "all_tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Set cache registry
        id: cache_registry
        run: |
          if [ "${{ inputs.enable_jfrog }}" == "true" ]; then
            echo "cache_ref=${{ env.JFROG_IMAGE_URL }}:buildcache" >> $GITHUB_OUTPUT
            echo "Using JFrog for build cache"
          elif [ "${{ inputs.enable_public_ecr }}" == "true" ]; then
            echo "cache_ref=${{ env.ECR_IMAGE_URL }}:buildcache" >> $GITHUB_OUTPUT
            echo "Using ECR for build cache"
          else
            echo "cache_ref=${{ env.GHCR_IMAGE_URL }}:buildcache" >> $GITHUB_OUTPUT
            echo "Using GHCR for build cache"
          fi

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          provenance: ${{ inputs.enable_provenance }}
          file: ${{ inputs.dockerfile_path }}
          context: ${{ inputs.image_context }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ env.all_tags }}
          cache-from: type=registry,ref=${{ steps.cache_registry.outputs.cache_ref }}
          cache-to: mode=max,image-manifest=true,compression=zstd,type=registry,ref=${{ steps.cache_registry.outputs.cache_ref }}
          build-args: |
            ${{ inputs.image_build_args }}
            ${{ secrets.image_build_secrets }}

      - name: Output image digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"

      - name: Install cosign
        if: ${{ inputs.enable_sign }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image(s) with cosign (keyless)
        id: sign_image
        if: ${{ inputs.enable_sign }}
        env:
          COSIGN_YES: 'true'
          DIGEST: ${{ steps.build.outputs.digest }}
          ENABLE_JFROG: ${{ inputs.enable_jfrog }}
          ENABLE_ECR: ${{ inputs.enable_public_ecr }}
          ENABLE_GHCR: ${{ inputs.enable_ghcr }}
          ENABLE_SBOM: ${{ inputs.enable_sbom }}
        run: |
          set -euo pipefail
          if [ -z "$DIGEST" ]; then
            echo "Error: image digest is empty, cannot sign" >&2
            exit 1
          fi

          if [ "$ENABLE_SBOM" != "true" ]; then
            echo "::notice::enable_sign is on but enable_sbom is off; no SBOM signature (*.sigstore.json) will be produced. Enable enable_sbom for the strongest OpenSSF Signed-Releases result."
          fi

          mkdir -p release-artifacts

          # Filesystem-safe base name shared by all release signature files.
          BASE="${{ inputs.image_artifact_name }}-${{ inputs.image_tag }}"
          BASE="${BASE//\//-}"

          # Collect every enabled registry ref for the pushed digest. The image
          # content is identical across registries, so one set of output files
          # (from the first ref) represents all of them.
          REFS=()
          if [ "$ENABLE_JFROG" == "true" ]; then REFS+=("${JFROG_IMAGE_URL}@${DIGEST}"); fi
          if [ "$ENABLE_ECR" == "true" ]; then REFS+=("${ECR_IMAGE_URL}@${DIGEST}"); fi
          if [ "$ENABLE_GHCR" == "true" ]; then REFS+=("${GHCR_IMAGE_URL}@${DIGEST}"); fi

          SIG_FILE="${BASE}.sig"
          CERT_FILE="${BASE}.pem"
          PAYLOAD_FILE="${BASE}.payload"

          first=1
          for ref in "${REFS[@]}"; do
            if [ "$first" == "1" ]; then
              echo "Signing ${ref} (emitting release files)"
              cosign sign --yes \
                --output-signature "release-artifacts/${SIG_FILE}" \
                --output-certificate "release-artifacts/${CERT_FILE}" \
                --output-payload "release-artifacts/${PAYLOAD_FILE}" \
                "${ref}"
              first=0
            else
              echo "Signing ${ref}"
              cosign sign --yes "${ref}"
            fi
          done

          echo "signature_file=${SIG_FILE}" >> "$GITHUB_OUTPUT"
          echo "certificate_file=${CERT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Install Syft
        id: syft
        if: ${{ inputs.enable_sbom }}
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        id: sbom
        if: ${{ inputs.enable_sbom }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          ENABLE_JFROG: ${{ inputs.enable_jfrog }}
          ENABLE_ECR: ${{ inputs.enable_public_ecr }}
          SYFT: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          if [ -z "$DIGEST" ]; then
            echo "Error: image digest is empty, cannot generate SBOM" >&2
            exit 1
          fi
          if [ -z "$SYFT" ]; then
            echo "Error: Syft command path is empty, cannot generate SBOM" >&2
            exit 1
          fi

          mkdir -p release-artifacts

          # The image content is identical across registries (same digest), so a
          # single SBOM is generated from whichever registry is enabled.
          if [ "$ENABLE_JFROG" == "true" ]; then
            REF="${JFROG_IMAGE_URL}@${DIGEST}"
          elif [ "$ENABLE_ECR" == "true" ]; then
            REF="${ECR_IMAGE_URL}@${DIGEST}"
          else
            REF="${GHCR_IMAGE_URL}@${DIGEST}"
          fi

          # Build a filesystem-safe SBOM file name from the artifact name and tag.
          SBOM_FILE="${{ inputs.image_artifact_name }}-${{ inputs.image_tag }}.spdx.json"
          SBOM_FILE="${SBOM_FILE//\//-}"

          echo "Generating SPDX SBOM for ${REF} -> release-artifacts/${SBOM_FILE}"
          "$SYFT" scan "registry:${REF}" -o spdx-json="release-artifacts/${SBOM_FILE}"

          echo "file=${SBOM_FILE}" >> "$GITHUB_OUTPUT"

      - name: Sign SBOM with cosign (keyless)
        id: sign_sbom
        if: ${{ inputs.enable_sign && inputs.enable_sbom }}
        env:
          COSIGN_YES: 'true'
          SBOM_FILE: ${{ steps.sbom.outputs.file }}
        run: |
          set -euo pipefail
          if [ -z "$SBOM_FILE" ]; then
            echo "Error: SBOM file name is empty, cannot sign SBOM" >&2
            exit 1
          fi

          # cosign sign-blob --bundle emits a self-contained Sigstore bundle
          # (signature + Fulcio cert + Rekor proof). Named *.sigstore.json so it
          # is recognised by the OpenSSF Signed-Releases check as a release asset.
          SIG_FILE="${SBOM_FILE}.sigstore.json"
          echo "Signing SBOM release-artifacts/${SBOM_FILE} -> release-artifacts/${SIG_FILE}"
          cosign sign-blob --yes \
            --bundle "release-artifacts/${SIG_FILE}" \
            "release-artifacts/${SBOM_FILE}"

          echo "signature_file=${SIG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload SBOM and signature artifact
        if: ${{ inputs.enable_sbom || inputs.enable_sign }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.sbom_artifact_name }}
          path: release-artifacts
          if-no-files-found: error
